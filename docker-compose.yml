services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data_net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      FAISS_INDEX_PATH: ${FAISS_INDEX_PATH:-/data/faiss.index}
      FAISS_ID_MAP_PATH: ${FAISS_ID_MAP_PATH:-/data/faiss_id_map.json}
      HF_HOME: ${HF_HOME:-/home/appuser/.cache/huggingface}
    volumes:
      - uploads_data:/app/uploads
      - faiss_data:/data
      - huggingface_cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - app_net

  http-backend:
    build:
      context: ./http-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-securepixel}
      UPSTASH_VECTOR_REST_URL: ${UPSTASH_VECTOR_REST_URL}
      UPSTASH_VECTOR_REST_TOKEN: ${UPSTASH_VECTOR_REST_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - app_net
      - data_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      http-backend:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/srv/uploads:ro
    ports:
      - "8080:80"
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  faiss_data:
  huggingface_cache:

networks:
  app_net:
    # Removed internal: true so Windows can talk to Nginx
  data_net:
    internal: true
