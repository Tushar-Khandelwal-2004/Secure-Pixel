name: CI

on:
  pull_request:
    branches:
      - main
      - deployement
  push:
    branches:
      - main
      - deployement

jobs:
  http-backend:
    name: HTTP backend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: http-backend/package-lock.json

      - name: Install dependencies
        working-directory: http-backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: http-backend
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Build TypeScript
        working-directory: http-backend
        run: npm run build

  ai-service:
    name: AI service syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m compileall -q ai-service/app
